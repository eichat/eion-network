<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">

<title>EION — Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@300;400;600&family=Noto+Sans+Arabic:wght@300;400;600&family=Noto+Sans+Devanagari:wght@300;400;600&family=Noto+Sans+Bengali:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --neon: #00d4ff;
  --neon2: #00aadd;
  --bg: #020c14;
  --bg2: #0a1628;
  --text: #e8f4f8;
  --text2: #7ab8cc;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  cursor: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 24px;
}

[dir="rtl"] { font-family: 'Noto Sans Arabic', 'Syne', sans-serif; }
.lang-ja { font-family: 'Noto Sans JP', 'Syne', sans-serif; }
.lang-ko { font-family: 'Noto Sans KR', 'Syne', sans-serif; }
.lang-zh { font-family: 'Noto Sans SC', 'Syne', sans-serif; }
.lang-hi { font-family: 'Noto Sans Devanagari', 'Syne', sans-serif; }
.lang-bn { font-family: 'Noto Sans Bengali', 'Syne', sans-serif; }
.lang-th { font-family: 'Noto Sans Thai', 'Syne', sans-serif; }

/* CURSOR */
.cursor { width:12px;height:12px;background:var(--neon);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;box-shadow:0 0 10px var(--neon),0 0 20px var(--neon);mix-blend-mode:screen;transition:transform 0.1s; }
.cursor-ring { width:36px;height:36px;border:1px solid var(--neon);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;opacity:0.5;transition:all 0.15s ease; }

/* STARS */
.stars { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden; }
.stars span { position:absolute;background:var(--neon);border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);opacity:0; }
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:var(--op,0.6);transform:scale(1)} }

/* GRID */
.bg-grid { position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);z-index:0; }
.bg-orb { position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,0.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;animation:pulse 4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)} }

/* CONTENT */
.wrap { position:relative;z-index:1;max-width:640px;width:100%; }

/* LOGO */
.logo-wrap { position:relative;width:120px;height:120px;margin:0 auto 32px;animation:float 6s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.logo-wrap img { width:100%;height:100%;border-radius:24px;filter:drop-shadow(0 0 30px rgba(0,212,255,0.7)) drop-shadow(0 0 60px rgba(0,212,255,0.3)); }
.logo-ring { position:absolute;inset:-18px;border:1px solid rgba(0,212,255,0.3);border-radius:50%;animation:spin 12s linear infinite; }
.logo-ring::before { content:'';position:absolute;width:8px;height:8px;background:var(--neon);border-radius:50%;top:-4px;left:50%;margin-left:-4px;box-shadow:0 0 12px var(--neon); }
@keyframes spin { to{transform:rotate(360deg)} }

/* TITLE */
.title { font-family:'Orbitron',monospace;font-size:clamp(3rem,10vw,5.5rem);font-weight:900;letter-spacing:10px;color:var(--neon);text-shadow:0 0 40px var(--neon),0 0 80px rgba(0,212,255,0.4);margin-bottom:8px;animation:appear 1s ease both; }
.subtitle { font-family:'Orbitron',monospace;font-size:clamp(0.55rem,2vw,0.75rem);letter-spacing:5px;color:var(--text2);margin-bottom:24px;animation:appear 1s 0.2s ease both; }
@keyframes appear { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

/* SLOGAN */
.slogan { font-size:clamp(0.9rem,2vw,1.05rem);color:var(--text2);line-height:1.8;font-weight:300;margin-bottom:40px;animation:appear 1s 0.4s ease both; }

/* YEAR */
.year-badge { display:inline-block;font-family:'Orbitron',monospace;font-size:0.7rem;letter-spacing:4px;color:var(--neon);border:1px solid rgba(0,212,255,0.3);padding:6px 20px;border-radius:20px;margin-bottom:40px;animation:appear 1s 0.5s ease both;background:rgba(0,212,255,0.05); }

/* EMAIL FORM */
.email-form { display:flex;gap:10px;max-width:480px;margin:0 auto 16px;animation:appear 1s 0.6s ease both;flex-wrap:wrap;justify-content:center; }
.email-input { flex:1;min-width:220px;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.25);color:var(--text);font-family:'Syne',sans-serif;font-size:0.9rem;padding:12px 20px;border-radius:4px;outline:none;transition:all 0.3s;cursor:text; }
.email-input::placeholder { color:var(--text2);opacity:0.6; }
.email-input:focus { border-color:var(--neon);box-shadow:0 0 16px rgba(0,212,255,0.2);background:rgba(0,212,255,0.08); }
.email-btn { padding:12px 28px;background:linear-gradient(135deg,var(--neon),var(--neon2));color:var(--bg);font-family:'Orbitron',monospace;font-size:0.7rem;font-weight:700;letter-spacing:2px;border:none;border-radius:4px;cursor:none;transition:all 0.3s;white-space:nowrap;text-transform:uppercase; }
.email-btn:hover { transform:translateY(-2px);box-shadow:0 0 30px rgba(0,212,255,0.5); }

.form-note { font-size:0.75rem;color:var(--text2);opacity:0.5;margin-bottom:40px;animation:appear 1s 0.7s ease both; }
.success-msg { display:none;font-family:'Orbitron',monospace;font-size:0.8rem;letter-spacing:2px;color:var(--neon);text-shadow:0 0 10px var(--neon);margin-bottom:16px;animation:appear 0.4s ease both; }
.success-msg.show { display:block; }

/* LANG */
.lang-switcher { position:fixed;top:20px;right:20px;z-index:100; }
[dir="rtl"] .lang-switcher { right:auto;left:20px; }
.lang-toggle { display:flex;align-items:center;gap:8px;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.25);color:var(--neon);font-family:'Orbitron',monospace;font-size:0.65rem;letter-spacing:2px;padding:6px 12px;cursor:none;border-radius:4px;transition:all 0.25s; }
.lang-toggle:hover { background:rgba(0,212,255,0.12); }
.lang-toggle .arr { transition:transform 0.3s;font-size:0.55rem; }
.lang-switcher.open .lang-toggle .arr { transform:rotate(180deg); }
.lang-dropdown { position:absolute;top:calc(100% + 8px);right:0;background:rgba(6,18,32,0.97);border:1px solid rgba(0,212,255,0.2);border-radius:6px;padding:6px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;min-width:210px;opacity:0;pointer-events:none;transform:translateY(-8px);transition:opacity 0.25s,transform 0.25s;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.6); }
[dir="rtl"] .lang-dropdown { right:auto;left:0; }
.lang-switcher.open .lang-dropdown { opacity:1;pointer-events:all;transform:translateY(0); }
.lang-opt { background:none;border:1px solid transparent;color:var(--text2);font-family:'Syne',sans-serif;font-size:0.72rem;padding:6px 8px;cursor:none;border-radius:3px;transition:all 0.2s;text-align:center; }
.lang-opt:hover { border-color:rgba(0,212,255,0.3);color:var(--neon);background:rgba(0,212,255,0.08); }
.lang-opt.active { border-color:var(--neon);color:var(--neon);background:rgba(0,212,255,0.1); }

::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:var(--neon);border-radius:2px}

@media(max-width:480px){
  .lang-switcher{top:12px;right:12px;}
  .email-form{flex-direction:column;}
  .email-input,.email-btn{width:100%;}
}
</style>
</head>

  tr: { sub:"Merkezi Olmayan İletişim Ağı", slogan:"Yapay zeka, HD aramalar ve yerleşik kripto token ile<br>yeni nesil mesajlaşma uygulaması.", btn:"Beni Bildir", placeholder:"your@email.com", note:"Spam yok. Yalnızca lansman bildirimi.", success:"✓ Listedesiniz!" },

const RTL = ['ar'];
const BROWSER_MAP = {ar:'ar',bn:'bn',de:'de',en:'en',es:'es',fr:'fr',hi:'hi',id:'id',it:'it',ja:'ja',ko:'ko',nl:'nl',pl:'pl',pt:'pt',ru:'ru',th:'th',tl:'tl',tr:'tr',uk:'uk',vi:'vi',zh:'zh'};
const LABELS = {en:'EN',fr:'FR',de:'DE',ja:'日本語',ko:'한국어',zh:'中文',es:'ES',ar:'العربية',pt:'PT',ru:'RU',tr:'TR',hi:'हिन्दी',vi:'VI',uk:'UA',id:'ID',th:'ไทย',tl:'TL',nl:'NL',pl:'PL',it:'IT',bn:'বাংলা'};

function setLang(lang) {
  const t = T[lang] || T.en;
  document.getElementById('subtitle').innerHTML = t.sub;
  document.getElementById('slogan').innerHTML = t.slogan;
  document.getElementById('emailBtn').textContent = t.btn;
  document.getElementById('emailInput').placeholder = t.placeholder;
  document.getElementById('formNote').textContent = t.note;
  document.getElementById('successMsg').textContent = t.success;
  document.getElementById('langLabel').textContent = LABELS[lang] || 'EN';
  document.querySelectorAll('.lang-opt').forEach(b => b.classList.toggle('active', b.getAttribute('data-lang') === lang));
  document.documentElement.setAttribute('dir', RTL.includes(lang) ? 'rtl' : 'ltr');
  document.documentElement.lang = lang;
  document.body.className = `lang-${lang}`;
  document.getElementById('langSwitcher').classList.remove('open');
  localStorage.setItem('eion_lang', lang);
}

function toggleLang() {
  document.getElementById('langSwitcher').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!document.getElementById('langSwitcher').contains(e.target))
    document.getElementById('langSwitcher').classList.remove('open');
});

function subscribe() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('emailInput').style.borderColor = '#ff6b6b';
    setTimeout(() => document.getElementById('emailInput').style.borderColor = '', 1000);
    return;
  }
  const btn = document.getElementById('emailBtn');
  btn.disabled = true;
  btn.style.opacity = '0.6';

  fetch('https://formspree.io/f/xdajyyaz', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ email: email })
  })
  .then(r => r.json())
  .then(data => {
    if (data.ok || data.next) {
      document.getElementById('emailInput').value = '';
      document.getElementById('successMsg').classList.add('show');
      document.querySelector('.email-form').style.display = 'none';
      document.getElementById('formNote').style.display = 'none';
    } else {
      btn.disabled = false;
      btn.style.opacity = '1';
      document.getElementById('emailInput').style.borderColor = '#ff6b6b';
    }
  })
  .catch(() => {
    btn.disabled = false;
    btn.style.opacity = '1';
    document.getElementById('emailInput').style.borderColor = '#ff6b6b';
  });
}

  for(let i=0;i<100;i++){
    const s=document.createElement('span');
    const sz=Math.random()*2+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*5}s;--delay:${-Math.random()*6}s;--op:${0.3+Math.random()*0.6}`;
    c.appendChild(s);
  }
})();

// Cursor
const cur=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx-6+'px';cur.style.top=my-6+'px';});
(function anim(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx-18+'px';ring.style.top=ry-18+'px';requestAnimationFrame(anim);})();
document.addEventListener('mousedown',()=>cur.style.transform='scale(1.8)');
document.addEventListener('mouseup',()=>cur.style.transform='scale(1)');

// Enter key
document.getElementById('emailInput').addEventListener('keypress', e => { if(e.key==='Enter') subscribe(); });

// Auto-detect language
const saved = localStorage.getItem('eion_lang');
const br = (navigator.language || 'en').slice(0,2).toLowerCase();
setLang(saved || BROWSER_MAP[br] || 'en');
</script>
</body>
</html>
